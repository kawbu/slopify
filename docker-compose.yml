version: '3.8'

services:
  dev:
    build: .
    volumes:
      - .:/workspace
      - /workspace/node_modules
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    command: /bin/bash

  backend:
    build: ./backend
    ports:
      - "8000:8000"
      - "8787:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload