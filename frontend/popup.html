<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Slopify</title>
    <style>
      body {
        width: 340px;
        font-family: system-ui, sans-serif;
        padding: 20px;
        margin: 0;
        background: #1a1a2e;
        color: #e0e0e0;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 4px;
      }
      .subtitle {
        font-size: 12px;
        color: #888;
        margin-bottom: 20px;
      }
      .section {
        margin-bottom: 20px;
      }
      .section-title {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #888;
        margin-bottom: 8px;
      }
      .input-row {
        display: flex;
        gap: 8px;
      }
      input[type="password"] {
        flex: 1;
        padding: 8px 10px;
        background: #16213e;
        border: 1px solid #2a3a5c;
        border-radius: 6px;
        color: #e0e0e0;
        font-size: 13px;
        outline: none;
      }
      input[type="password"]:focus {
        border-color: #4285f4;
      }
      .save-btn {
        padding: 8px 16px;
        background: #4285f4;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
      }
      .save-btn:hover {
        background: #3367d6;
      }
      #key-status {
        font-size: 11px;
        margin-top: 6px;
        min-height: 16px;
      }
      .status-saved { color: #4ade80; }
      .status-missing { color: #fca5a5; }
      .how-to {
        padding: 12px;
        background: #16213e;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.6;
        color: #aaa;
      }
      .how-to strong {
        color: #e0e0e0;
      }
      .step {
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Slopify</h1>
    <div class="subtitle">AI-powered fact-checking</div>

    <div class="section">
      <div class="section-title">API Key</div>
      <div class="input-row">
        <input type="password" id="api-key-input" placeholder="sk-ant-..." />
        <button class="save-btn" id="save-btn">Save</button>
      </div>
      <div id="key-status"></div>
    </div>

    <div class="section">
      <div class="section-title">How to use</div>
      <div class="how-to">
        <div class="step"><strong>1.</strong> Highlight any text on a webpage</div>
        <div class="step"><strong>2.</strong> Right-click the selection</div>
        <div class="step"><strong>3.</strong> Click <strong>"Fact-check with Slopify"</strong></div>
        <div class="step">Results appear in a floating panel on the page.</div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
