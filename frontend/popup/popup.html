<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slopify - Risk Score</title>
    <link rel="stylesheet" href="../popup/popup.css">
</head>
<body>
    <div class="header">
        <div class="logo-section">
            <img src="../../public/Slopify.png" alt="Slopify" class="logo">
            <div class="logo-text">Slopify</div>
        </div>
        <button class="settings-icon" id="settingsButton" aria-label="Settings" title="Settings">
            <span class="settings-icon-svg" id="settingsIcon"></span>
        </button>
    </div>

    <div class="container">
        <div class="circle-container">
            <svg class="progress-circle" viewBox="0 0 200 200">
                <circle class="circle-background" cx="100" cy="100" r="90"></circle>
                <circle class="circle-progress" id="progressCircle" cx="100" cy="100" r="90"></circle>
            </svg>
            <div class="circle-text">
                <div class="score-number" id="scoreNumber">73</div>
                <div class="score-label">Risk Score</div>
            </div>
        </div>
        <div class="domain">example.com</div>
        <div class="status" id="statusText">Select text on a page, then analyze.</div>
        <div class="verdict" id="verdictText">Verdict: —</div>
        <div class="summary" id="summaryText">Summary: —</div>
    </div>

    <div class="indicators-container">
        <div class="indicator-row">
            <div class="indicator-label">
                <div class="indicator-title">Red Flags</div>
                <div class="indicator-description" id="redFlagsDescription">No red flags returned.</div>
            </div>
            <div class="indicator-percentage" id="redFlagsCount">0</div>
        </div>

        <div class="indicator-row">
            <div class="indicator-label">
                <div class="indicator-title">Claims</div>
                <div class="indicator-description" id="claimsDescription">No claims returned.</div>
            </div>
            <div class="indicator-percentage" id="claimsCount">0</div>
        </div>
    </div>

    <script src="../popup/popup.js"></script>
</body>
</html>
